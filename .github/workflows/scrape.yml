name: Daily Fund Data & Simulation

on:
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = 北京时间 02:00 (美股收盘后)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 numpy

      - name: Scrape fund data
        run: python scraper/scrape.py
        continue-on-error: true

      - name: Pre-compute simulations
        run: python scraper/simulate.py

      - name: Commit and push
        run: |
          git config user.name "fund-bot"
          git config user.email "bot@fund-advisor.local"
          git add public/data/funds.json public/data/simulations.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update fund data $(date -u +%Y-%m-%d)"
            git push
          fi
